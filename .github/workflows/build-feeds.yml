name: Build Seed Feeds

on:
  schedule:
    # Mondays at 06:17 UTC. Off-the-hour to avoid cron herd.
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build seed-feeds.json
        env:
          PODCAST_INDEX_KEY: ${{ secrets.PODCAST_INDEX_KEY }}
          PODCAST_INDEX_SECRET: ${{ secrets.PODCAST_INDEX_SECRET }}
        run: python scripts/build_seed_feeds.py

      - name: Show summary
        run: |
          echo "## Seed feeds build summary" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat public/seed-feeds-meta.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/seed-feeds.json public/seed-feeds-meta.json
          if git diff --quiet --staged; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh seed feeds ($(date -u +'%Y-%m-%d'))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          # Edge-cache is ~12h by default; purge forces fresh pull on next fetch.
          curl -fsSL "https://purge.jsdelivr.net/gh/colsonrice/stirred-feeds@main/public/seed-feeds.json" || true
          curl -fsSL "https://purge.jsdelivr.net/gh/colsonrice/stirred-feeds@main/public/seed-feeds-meta.json" || true
